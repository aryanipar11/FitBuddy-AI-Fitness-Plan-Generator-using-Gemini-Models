<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBuddy - AI Workout Generator</title>
    <!-- CSS is loaded from static/style.css -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container hero-container">
        <h1>Welcome to <span class="highlight">FitBuddy</span></h1>
        <p class="subtitle">Your personal AI Workout Generator</p>
        
        <form action="/generate-workout" method="post" class="fitness-form form-box">
            <h2 class="form-title">Tell us about yourself</h2>
            
            <div class="form-group">
                <label for="username">Your Name</label>
                <input type="text" id="username" name="username" placeholder="e.g. John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="user_id">User ID</label>
                <input type="text" id="user_id" name="user_id" placeholder="Choose a unique ID" required>
            </div>
            
            <div class="input-row">
                <div class="form-group third-width">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" placeholder="25" required>
                </div>
                <div class="form-group third-width">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" name="height" placeholder="175" required>
                </div>
                <div class="form-group third-width">
                    <label for="weight">Weight (kg/lbs)</label>
                    <input type="number" id="weight" name="weight" placeholder="70" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="goal">Fitness Goal</label>
                <input type="text" id="goal" name="goal" placeholder="e.g. Build Muscle, Lose Fat" required>
            </div>
            
            <div class="form-group">
                <label for="intensity">Workout Intensity</label>
                <select id="intensity" name="intensity" required>
                    <option value="low">Low - Beginner friendly</option>
                    <option value="medium" selected>Medium - Breaking a sweat</option>
                    <option value="high">High - Push my limits</option>
                </select>
            </div>
            
            <button type="submit" class="submit-btn">Generate AI Plan ✨</button>
        </form>
    </div>
</body>
</html>
